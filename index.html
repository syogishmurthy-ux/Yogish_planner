<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Yogish Planner</title>

<style>
:root {
  --bg: #0e0e10;
  --surface: #18181c;
  --text: #f0ede8;
  --muted: #7a7a85;
  --accent: #d4f564;
  --border: rgba(255,255,255,0.1);
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: Arial;
  padding: 20px;
}

.light-mode {
  --bg: #ffffff;
  --surface: #f5f5f5;
  --text: #111;
  --muted: #555;
}

header {
  display: flex;
  justify-content: space-between;
  margin-bottom: 20px;
}

button {
  padding: 8px 12px;
  border-radius: 6px;
  border: none;
  cursor: pointer;
}

input {
  padding: 10px;
  width: 100%;
  margin-bottom: 10px;
}

.task {
  background: var(--surface);
  padding: 10px;
  margin-bottom: 8px;
  border-radius: 8px;
  display: flex;
  justify-content: space-between;
}
</style>
</head>

<body>

<header>
  <h2>Planner</h2>
  <div>
    <button onclick="toggleTheme()">🌙 Theme</button>
    <button onclick="clearAllTasks()">🗑 Clear</button>
  </div>
</header>

<!-- SEARCH -->
<input type="text" id="search" placeholder="Search tasks..." oninput="searchTask()" />

<!-- ADD TASK -->
<input type="text" id="taskInput" placeholder="Enter task..." />
<button onclick="addTask()">Add Task</button>

<!-- TASK LIST -->
<div id="taskList"></div>

<script>

let tasks = [];

// ADD TASK
function addTask() {
  const input = document.getElementById("taskInput");
  if (!input.value) return;

  tasks.push(input.value);
  input.value = "";
  renderTasks();
}

// RENDER
function renderTasks() {
  const list = document.getElementById("taskList");
  list.innerHTML = "";

  tasks.forEach((task, index) => {
    list.innerHTML += `
      <div class="task">
        <span>${task}</span>
        <button onclick="deleteTask(${index})">❌</button>
      </div>
    `;
  });
}

// DELETE
function deleteTask(i) {
  tasks.splice(i, 1);
  renderTasks();
}

// CLEAR ALL
function clearAllTasks() {
  if (confirm("Delete all tasks?")) {
    tasks = [];
    renderTasks();
  }
}

// SEARCH
function searchTask() {
  const q = document.getElementById("search").value.toLowerCase();
  const items = document.querySelectorAll(".task");

  items.forEach(item => {
    item.style.display = item.innerText.toLowerCase().includes(q) ? "" : "none";
  });
}

// THEME
function toggleTheme() {
  document.body.classList.toggle("light-mode");
}

</script>

</body>
</html>
